<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>国际战略学兵棋推演实验室</title>
    <meta name="description" content="基于地理空间数据的多域作战模拟。部署单位，选择理论框架，并运行反事实推演。" />
    <style>
      body {
        margin: 0;
        background-color: #020617; /* slate-950 */
        color: #f8fafc; /* slate-50 */
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        overflow: hidden;
      }
      
      /* 初始加载动画样式 */
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #020617;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      
      .loader-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(59, 130, 246, 0.2); /* blue-500 with opacity */
        border-left-color: #3b82f6; /* blue-500 */
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 24px;
      }
      
      .loader-title {
        font-size: 1.5rem;
        font-weight: bold;
        letter-spacing: 0.05em;
        margin: 0 0 8px 0;
        color: #f8fafc;
      }
      
      .loader-subtitle {
        font-size: 0.875rem;
        color: #94a3b8; /* slate-400 */
        margin: 0;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- 初始加载界面：在 React 渲染完成前显示 -->
    <div id="initial-loader">
      <div class="loader-spinner"></div>
      <h1 class="loader-title">国际战略学兵棋推演实验室</h1>
      <p class="loader-subtitle">系统初始化中，正在加载沙盘地图与理论模块...</p>
    </div>

    <!-- React 应用挂载点 -->
    <div id="root"></div>

    <!-- 监听 React 挂载，完成后移除加载界面 -->
    <script>
      const observer = new MutationObserver((mutations, obs) => {
        const root = document.getElementById('root');
        if (root && root.hasChildNodes()) {
          const loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 500); // 等待淡出动画结束
          }
          obs.disconnect(); // 停止监听
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
    
    <!-- Vite/React 入口文件 -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
